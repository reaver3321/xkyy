# Nginx configuration for xkyy
# Deploy under /xkyy path
# Copy this to: /etc/nginx/conf.d/xkyy.conf

server {
    listen 8080 default_server;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Xkyy application
    location /xkyy/ {
        alias /home/admin/xkyy/dist/;
        try_files $uri $uri/ /xkyy/index.html;
        index index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirect /xkyy to /xkyy/
    location = /xkyy {
        return 301 /xkyy/;
    }

    # Root location
    location / {
        return 404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
